services:
  - type: web
    name: moviemate
    env: docker
    plan: free
    region: oregon
    envVars:
      - key: TMDB_API_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "6543"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
